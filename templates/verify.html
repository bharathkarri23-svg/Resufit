<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Resufit</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth_split.css') }}">
    <style>
        .timer-text { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-top: 1rem; }
    </style>
</head>
<body>

    <main class="split-layout">
        
        <!-- LEFT SIDE: Branding & Animation -->
        <div class="split-left">
            <a href="/" class="split-logo">
                <i class="fa-solid fa-file-signature"></i> Resufit
            </a>
            
            <!-- background animation elements trapped in left panel -->
            <div class="bg-shape shape-1"></div>
            <div class="bg-shape shape-2" style="bottom: 10%; right: 10%;"></div>
            
            <div class="split-left-content animate-on-scroll">
                <h1>Verify Email</h1>
                <p>Security is our priority.</p>
            </div>
        </div>

        <!-- RIGHT SIDE: Frameless Form Area -->
        <div class="split-right">
            
            <!-- Optional Top Right Nav Links removed per request -->

            <div class="split-form-container">
                <div class="split-header">
                    <h2>Verify Your Email</h2>
                    <p>We've sent a One-Time Password (OTP) to your email. Please enter it below.</p>
                </div>
                
                <form action="/verify" method="post" class="auth-form">
                    <div class="input-group">
                        <label for="otp"><i class="fa-solid fa-key"></i> Enter OTP</label>
                        <input type="text" id="otp" name="otp" placeholder="e.g. 123456" required style="text-align: center; letter-spacing: 2px; font-weight: 600;">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100" style="margin-top: 1rem;">Verify OTP</button>
                </form>
                
                <div class="divider">
                    <span>or</span>
                </div>

                <button id="resendBtn" class="btn btn-outline w-100" onclick="resendOTP()">
                    <i class="fa-solid fa-rotate-right"></i> Resend OTP
                </button>
                
                <p id="timer" class="timer-text"></p>
                
                {% if error %}
                    <div class="error-message">
                        <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
                    </div>
                {% endif %}
            </div>
        </div>

    </main>

    <!-- SCRIPTS -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Intersection Observer
            const observerOptions = { root: null, rootMargin: '0px', threshold: 0.1 };
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));

            // Timer Logic
            let countdown = 30;
            let resendBtn = document.getElementById("resendBtn");
            let timerText = document.getElementById("timer");
            
            resendBtn.disabled = true;
            resendBtn.style.opacity = '0.5';
            resendBtn.style.cursor = 'not-allowed';
            
            let interval = setInterval(function() {
                countdown--;
                timerText.innerHTML = "Resend available in " + countdown + "s";
            
                if (countdown <= 0) {
                    clearInterval(interval);
                    resendBtn.disabled = false;
                    resendBtn.style.opacity = '1';
                    resendBtn.style.cursor = 'pointer';
                    timerText.innerHTML = "";
                }
            }, 1000);
        });

        function resendOTP() {
            window.location.href = "/resend_otp";
        }
    </script>
</body>
</html>
