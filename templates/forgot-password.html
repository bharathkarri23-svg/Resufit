<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Resufit</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth_split.css') }}">
</head>
<body>

    <main class="split-layout">
        
        <!-- LEFT SIDE: Branding & Animation -->
        <div class="split-left">
            <a href="/" class="split-logo">
                <i class="fa-solid fa-file-signature"></i> Resufit
            </a>
            
            <!-- background animation elements trapped in left panel -->
            <div class="bg-shape shape-1"></div>
            <div class="bg-shape shape-2" style="bottom: 10%; right: 10%;"></div>
            
            <div class="split-left-content animate-on-scroll">
                <h1>Forgot Password</h1>
                <p>Don't worry, happens to the best of us.</p>
            </div>
        </div>

        <!-- RIGHT SIDE: Frameless Form Area -->
        <div class="split-right">
            
            <!-- Optional Top Right Nav Links removed per request -->

            <div class="split-form-container">
                <div class="split-header">
                    <h2>Reset Password</h2>
                    <p>Enter your email address and we'll send you a link to reset your password.</p>
                </div>
                
                <form action="/forgot-password" method="post" class="auth-form">
                    <div class="input-group">
                        <label for="email"><i class="fa-solid fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" name="email" placeholder="name@example.com" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100" style="margin-top: 1rem;">Reset Password</button>
                </form>
                
                <div class="divider">
                    <span>or</span>
                </div>
                
                <p class="auth-redirect">Remember your password? <a href="/signin">Sign In</a></p>
                
                {% if error %}
                    <div class="error-message">
                        <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
                    </div>
                {% endif %}
            </div>
        </div>

    </main>

    <!-- SCRIPTS -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Intersection Observer
            const observerOptions = { root: null, rootMargin: '0px', threshold: 0.1 };
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
